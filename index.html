<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Install CupraFlow</title>
  <style>
    body {
      background: #0E0E0E;
      color: #F0F0F0;
      font-family: system-ui, -apple-system, sans-serif;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      margin: 0;
      text-align: center;
    }
    .container { max-width: 600px; padding: 2rem; }
    h1 { color: #B87333; margin-bottom: 0.5rem; }
    p { color: #6B6B6B; margin-bottom: 2rem; }
    .code {
      background: #161616;
      border: 1px solid #2A2A2A;
      border-radius: 8px;
      padding: 1rem;
      font-family: "Geist Mono", "Fira Code", monospace;
      font-size: 0.9rem;
      color: #E8A15A;
      word-break: break-all;
      cursor: pointer;
      user-select: all;
    }
    .code:hover { border-color: #B87333; }
    .label { font-size: 0.75rem; color: #6B6B6B; margin-bottom: 0.5rem; text-transform: uppercase; letter-spacing: 0.05em; }
    footer { margin-top: 3rem; font-size: 0.8rem; color: #3A3A3A; }
    a { color: #B87333; text-decoration: none; }
  </style>
</head>
<body>
  <div class="container">
    <h1>CupraFlow</h1>
    <p>Load balancer agent for Windows and Linux</p>

    <div class="label">Windows (PowerShell as Administrator)</div>
    <div class="code" onclick="copyToClipboard(this)">irm https://install.cupraflow.dev/windows | iex</div>

    <footer>
      <a href="https://github.com/sb-mcampoe/cupraflow">GitHub</a> &bull;
      <a href="https://cupraflow.dev">Website</a>
    </footer>
  </div>

  <script>
    function copyToClipboard(el) {
      const text = el.innerText;
      navigator.clipboard.writeText(text).then(() => {
        const original = el.innerText;
        el.innerText = "Copied!";
        setTimeout(() => el.innerText = original, 1200);
      });
    }
  </script>
</body>
</html>
